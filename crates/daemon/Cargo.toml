[package]
name = "daemon"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "saild"
path = "src/main.rs"

[dependencies]
http-body-util = "0.1.2"
hyper = { version = "1.5.2", features = ["http1", "server"] }
hyper-util = { version = "0.1.10", features = ["tokio"] }
tokio = { version = "1.42.0", features = ["macros", "net", "rt-multi-thread"] }
